```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbon Footprint Calculator</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f4f9f6;
}

header{
background:#2e7d32;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
color:#2e7d32;
text-align:center;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.result{
margin-top:25px;
font-size:18px;
text-align:center;
color:#333;
}

</style>
</head>

<body>

<header>
<h1>Carbon Ledger 🌱</h1>
<p>Household Carbon Footprint Calculator</p>
</header>

<div class="container">

<h2>Calculate Your Carbon Emissions</h2>

<label>🚗 Distance traveled by car per month (km)</label>
<input type="number" id="car" placeholder="Example: 200">

<label>🚌 Distance traveled by public transport per month (km)</label>
<input type="number" id="bus" placeholder="Example: 100">

<label>⚡ Electricity used per month (kWh)</label>
<input type="number" id="electricity" placeholder="Example: 250">

<label>🔥 LPG cylinders used per month</label>
<input type="number" id="gas" placeholder="Example: 1">

<label>👨‍👩‍👧 Number of people in the household</label>
<input type="number" id="people" placeholder="Example: 4">

<button onclick="calculateCarbon()">Calculate Carbon Emission</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateCarbon(){

let car = document.getElementById("car").value || 0;
let bus = document.getElementById("bus").value || 0;
let electricity = document.getElementById("electricity").value || 0;
let gas = document.getElementById("gas").value || 0;
let people = document.getElementById("people").value || 1;

// emission factors
let carEmission = car * 0.21;
let busEmission = bus * 0.1;
let electricityEmission = electricity * 0.85;
let gasEmission = gas * 42;

let total = carEmission + busEmission + electricityEmission + gasEmission;

let perPerson = total / people;

document.getElementById("result").innerHTML =
"🌍 Total Monthly Carbon Emission: <b>" + total.toFixed(2) + " kg CO₂</b><br>" +
"👤 Per Person Emission: <b>" + perPerson.toFixed(2) + " kg CO₂</b>";

}

</script>

</body>
</html>
