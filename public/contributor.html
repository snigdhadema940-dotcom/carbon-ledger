<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contribute | Carbon Ledger</title>

<style>

body{
background:#f4f7f6;
font-family:Arial;
margin:0;
}

/* HEADER */

.header{

color:black;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
margin-top:30px;
}

/* FORM */

.form-card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:500px;
margin:40px auto;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#256628;
}
/* Navbar */
.nav {
    display: flex;
    align-items: center;
    gap: 20px;
}

/* Sign In button */
.signin {
    background: #2e7d32;
    color: white;
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
}

/* User dropdown */
.user-dropdown {
    position: relative;
    cursor: pointer;
    font-size: 20px;
}

/* Dropdown menu */
.user-dropdown-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 30px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    padding: 10px;
}

/* Show on hover */
.user-dropdown:hover .user-dropdown-menu {
    display: block;
}

/* Logout button */
.user-dropdown-menu a {
    text-decoration: none;
    color: #333;
    padding: 8px 12px;
    display: block;
}

.user-dropdown-menu a:hover {
    background: #f0f0f0;
    border-radius: 5px;
}
/* EVENTS */

.events-title{
text-align:center;
color:#2e7d32;
margin-top:30px;
}
.nav {
  display: flex;
  gap: 40px;
  margin-top: 100px;
  


}

/* Nav links */
.nav-link {
  text-decoration: none;
  font-size: 18px;
  font-weight: 600;
  color: white;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  position:relative;
  display:inline-block;
}

/* Hover underline effect */
.nav-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -3px;
  width: 0;
  height: 3px;
  background-color: aqua;
  transition: width 0.3s ease;
}

.nav-link:hover::after {
  width:100%;
  
}

/* Sign up button style */
.signup {
  padding: 10px 20px;
  background-color:white;
  color: green;
  border-radius: 10px;
}

.signup:hover {
  background-color: white;
}
.rectangle{
    background-color: green;
     height: 120px;
     display: flex;
     align-items: center;
     justify-content: space-between;
     padding-left: 70px;
     padding-right: 100px;
}
.logo{
    height:100px;
    width:100px;
}
.text {
  font-size: 40px;
  font-weight: 1000;
  color:white;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  padding-right: 70px;
}

#events{
width:80%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:20px;
}

/* EVENT CARD */

.event-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.2s;
}

.event-card:hover{
transform:translateY(-4px);
}

.event-card h3{
color:#2e7d32;
margin-bottom:8px;
}

.location{
color:#555;
font-size:14px;
margin-top:8px;
}

.user{
font-size:13px;
color:#777;
margin-top:10px;
}

</style>

</head>

<body>
<div>
        <div class="rectangle">
       <img src="carbon.logo.png" class="logo">
       <div class="text"><center>The Carbon Ledger</center>
       </div>
      <nav class="nav">
  <a href="index.html" class="nav-link">Home</a>
  <a href="aboutUs.html" class="nav-link">About Us</a>
  <a href="contributor.html" class="nav-link">Contribute</a>

  <!-- Sign In -->
  <a href="signin.html" id="authLink" class="nav-link signin">Sign In</a>

  <!-- User Icon -->
  <div class="user-dropdown" id="userSection" style="display:none;">
    👤
    <div class="user-dropdown-menu" id="dropdownMenu">
      <a href="/logout">Logout</a>
    </div>
  </div>
</nav>
        </div>
    </div>
<div class="header">
🌍 Carbon Ledger – Community Events
</div>



<div class="form-card">

<h2>Post Environmental Event</h2>

<form id="eventForm">

<input type="text" id="title" placeholder="Event Title" required>

<input type="text" id="location" placeholder="Location" required>

<textarea id="description" placeholder="Event Description"></textarea>

<button type="submit">Post Event</button>

</form>

</div>

<h2 class="events-title">Community Events</h2>

<div id="events"></div>

<script src="contribute.js"></script>

</body>
</html>
