<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Sign In | The Carbon Ledger</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
background-image:url("background(2).png");
background-size:cover;
background-position:center;
}

/* overlay */

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.45);
z-index:0;
}

/* center login */

.page-center{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
position:relative;
z-index:1;
}

/* login card */

.login-card{
background:white;
width:360px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.login-card h2{
text-align:center;
color:#2e7d32;
margin-bottom:20px;
}

.login-card input{
width:100%;
padding:10px;
margin:8px 0 15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#256628;
}

.signup{
text-align:center;
margin-top:10px;
color:white;
}

.signup a{
color:#a5ffb2;
}

</style>

</head>

<body>

<div class="overlay"></div>

<!-- NAVBAR -->

<div class="rectangle">

<img src="carbon.logo.png" class="logo">

<div class="text">
<center>The Carbon Ledger...</center>
</div>

<nav class="nav">

<a href="index.html" class="nav-link">Home</a>
<a href="aboutUs.html" class="nav-link">About Us</a>
<a href="contributor.html" class="nav-link">Contribute</a>
<a href="signin.html" class="nav-link signin">Sign In</a>

</nav>

</div>

<!-- LOGIN SECTION -->

<div class="page-center">

<div class="login-card">

<h2>Sign In</h2>

<form action="/login" method="POST">

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Sign In</button>

</form>

<p class="signup">
Don't have an account?
<a href="signup.html">Create one</a>
</p>

</div>

</div>

</body>
</html>
