<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contribute | Carbon Ledger</title>

<style>

body{
background:#f4f7f6;
font-family:Arial;
margin:0;
}

/* HEADER */

.header{
background:#2e7d32;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* FORM */

.form-card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:500px;
margin:40px auto;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#256628;
}

/* EVENTS */

.events-title{
text-align:center;
color:#2e7d32;
margin-top:30px;
}

#events{
width:80%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:20px;
}

/* EVENT CARD */

.event-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.2s;
}

.event-card:hover{
transform:translateY(-4px);
}

.event-card h3{
color:#2e7d32;
margin-bottom:8px;
}

.location{
color:#555;
font-size:14px;
margin-top:8px;
}

.user{
font-size:13px;
color:#777;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
🌍 Carbon Ledger – Community Events
</div>

<!-- POST EVENT FORM -->

<div class="form-card">

<h2>Post Environmental Event</h2>

<form id="eventForm">

<input type="text" id="title" placeholder="Event Title" required>

<input type="text" id="location" placeholder="Location" required>

<textarea id="description" placeholder="Event Description"></textarea>

<button type="submit">Post Event</button>

</form>

</div>

<h2 class="events-title">Community Events</h2>

<div id="events"></div>

<script src="contribute.js"></script>

</body>
</html>
